<!DOCTYPE html>
<html>
<head>
    <title>My Profile — BazaarHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="top-bar">
    <h1>🛍️ BazaarHub</h1>
    <div class="nav-right">
        <a href="/cart" id="cartLink" class="cart-link">🛒 Cart (<span id="cartCount">0</span>)</a>
        <div class="user-menu">
            <button class="user-avatar" id="avatarBtn">U</button>
            <div class="dropdown" id="dropdown">
                <div class="dropdown-name" id="dropdownName">User</div>
                <div class="dropdown-email" id="dropdownEmail"></div>
                <hr>
                <a href="/profile">👤 Profile</a>
                <a href="#" id="logoutBtn">🚪 Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="profile-page">
    <div class="profile-card">
        <div class="profile-avatar-lg" id="profileAvatar">U</div>
        <h1 id="profileName">User</h1>
        <p class="email-note" id="profileEmail"></p>

        <div class="profile-success" id="successMsg">Profile updated successfully!</div>

        <form id="profileForm">
            <label for="name">Full Name</label>
            <input type="text" id="name" required>
            <button type="submit" style="margin-top:16px">Save Changes</button>
        </form>
    </div>
</div>

<script src="/js/nav.js"></script>
<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "/login";

updateCartCount();
loadProfile();

async function loadProfile() {
    const res = await fetch("/api/auth/profile", {
        headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) { window.location.href = "/login"; return; }

    const user = await res.json();
    document.getElementById("profileName").innerText = user.name;
    document.getElementById("profileEmail").innerText = user.email;
    document.getElementById("profileAvatar").innerText = user.name.charAt(0).toUpperCase();
    document.getElementById("name").value = user.name;
}

document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const res = await fetch("/api/auth/profile", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ name: document.getElementById("name").value })
    });

    const data = await res.json();
    if (!res.ok) { alert(data.message); return; }

    // localStorage me bhi updated name save karo taaki navbar/dropdown sahi dikhe
    const user = JSON.parse(localStorage.getItem("user"));
    user.name = data.name;
    localStorage.setItem("user", JSON.stringify(user));

    document.getElementById("successMsg").classList.add("show");
    document.getElementById("profileName").innerText = data.name;
    document.getElementById("profileAvatar").innerText = data.name.charAt(0).toUpperCase();

    setTimeout(() => document.getElementById("successMsg").classList.remove("show"), 3000);
});

async function updateCartCount() {
    const countEl = document.getElementById("cartCount");
    if (!countEl || !token) return;
    const res = await fetch("/api/cart", { headers: { "Authorization": "Bearer " + token } });
    if (!res.ok) return;
    const items = await res.json();
    countEl.innerText = items.reduce((sum, item) => sum + item.quantity, 0);
}
</script>
</body>
</html>
